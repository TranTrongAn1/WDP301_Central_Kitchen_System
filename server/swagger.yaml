        Update general information for a production plan (Admin, Manager, Kitchen Staff only).

        **Allowed fields:** `planCode`, `planDate`, `note` only.

        **Not allowed:** `details` and `orders` are auto-generated from the original `orderIds` at creation and are immutable.
