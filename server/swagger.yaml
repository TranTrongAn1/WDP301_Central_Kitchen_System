openapi: 3.0.0
info:
  title: Kendo Mooncake Central Kitchen System API
  description: |
    API documentation for the Kendo Mooncake Central Kitchen System with full traceability support.
    
    **Key Features:**
    - Feature 1: Admin & System Management
    - Feature 2: Inventory & Sourcing (Input Traceability)
    - Feature 3: Production Management (Output Traceability)
    - Feature 4: Logistics & Supply Chain (Order-to-Delivery)
    - Feature 5: Store & Distribution Management
    
    **Traceability Chain:**
    Supplier → Ingredient Batch → Ingredient → Product Recipe → Production Plan → Finished Batch → Order → Delivery Trip → Store Inventory
    Order → Invoice (Financial Tracking)
  version: 2.0.0
  contact:
    name: API Support
    email: support@kendomooncake.com

servers:
  - url: https://wdp301-central-kitchen-system.onrender.com
    description: Production server (Render)
  - url: http://localhost:5000
    description: Development server (Local)

tags:
  - name: Health
    description: System health check endpoints
  - name: Authentication
    description: User authentication and authorization endpoints
  - name: Categories
    description: Product category management endpoints
  - name: Suppliers
    description: Supplier management for raw material sourcing (Feature 2)
  - name: Ingredients
    description: Ingredient and raw material management endpoints
  - name: Ingredient Batches
    description: Ingredient batch import and FEFO tracking (Feature 2)
  - name: Products
    description: Product management with recipe and bundle capabilities
  - name: Production Plans
    description: Production plan management and scheduling (Feature 3)
  - name: Production
    description: Production batch execution and completion tracking
  - name: Finished Batches
    description: Finished goods batch tracking with production plan linkage (Feature 3)
  - name: Inventory
    description: Store inventory tracking and management (Feature 5)
  - name: Stores
    description: Store management and retail location operations
  - name: Users
    description: User and staff administration endpoints
  - name: Logistics
    description: Order management and delivery operations
  - name: Feedback
    description: Order feedback and rating management
  - name: Payment
    description: Payment gateway integration using PayOS
  - name: System Settings
    description: Global system configurations (Shipping fees, Tax rates, etc.). Used by Mobile App to fetch dynamic prices.

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health Check
      description: Check if the API server is running
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  timestamp:
                    type: string

  /api/auth/register:
    post:
      tags:
        - Authentication
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
                - fullName
                - email
                - roleId
              properties:
                username:
                  type: string
                password:
                  type: string
                fullName:
                  type: string
                email:
                  type: string
                roleId:
                  type: string
                storeId:
                  type: string
      responses:
        '201':
          description: User registered successfully

  /api/auth/login:
    post:
      tags:
        - Authentication
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: 'admin'
                password:
                  type: string
                  example: 'admin123'
      responses:
        '200':
          description: Login successful

  /api/auth/me:
    get:
      tags:
        - Authentication
      summary: Get current user
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Successfully retrieved user

  /api/categories:
    get:
      tags:
        - Categories
      summary: Get all categories
      description: Retrieve list of all product categories
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Successfully retrieved categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                        categoryName:
                          type: string
                        createdAt:
                          type: string
                        updatedAt:
                          type: string
    post:
      tags:
        - Categories
      summary: Create category
      description: Create a new product category (Admin, Kitchen_Manager only)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - categoryName
              properties:
                categoryName:
                  type: string
                  example: 'Bánh Nướng'
      responses:
        '201':
          description: Category created successfully
        '400':
          description: Invalid input or duplicate category name

  /api/categories/{id}:
    get:
      tags:
        - Categories
      summary: Get category by ID
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Category ID
      responses:
        '200':
          description: Successfully retrieved category
        '404':
          description: Category not found
    put:
      tags:
        - Categories
      summary: Update category
      description: Update an existing category (Admin, Kitchen_Manager only)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Category ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                categoryName:
                  type: string
                  example: 'Bánh Dẻo'
      responses:
        '200':
          description: Category updated successfully
        '400':
          description: Invalid input or duplicate category name
        '404':
          description: Category not found
    delete:
      tags:
        - Categories
      summary: Delete category
      description: Delete a category (Admin, Kitchen_Manager only). Cannot delete if category is used by products.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Category ID
      responses:
        '200':
          description: Category deleted successfully
        '400':
          description: Cannot delete - category is in use
        '404':
          description: Category not found

  # ============================================================
  # FEATURE 2: SUPPLIERS (Sourcing & Traceability)
  # ============================================================
  /api/suppliers:
    get:
      tags:
        - Suppliers
      summary: Get all suppliers
      description: Retrieve list of all suppliers for raw material sourcing
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Successfully retrieved suppliers
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Supplier'
    post:
      tags:
        - Suppliers
      summary: Create supplier
      description: Register a new supplier (Admin, Manager only)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - contactPerson
                - phone
                - email
                - address
              properties:
                name:
                  type: string
                  example: 'Golden Harvest Supplier'
                contactPerson:
                  type: string
                  example: 'Nguyen Van A'
                phone:
                  type: string
                  example: '+84-28-12345678'
                email:
                  type: string
                  example: 'contact@goldenharvest.vn'
                address:
                  type: string
                  example: 'Industrial Zone, Binh Duong Province'
      responses:
        '201':
          description: Supplier created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Supplier'
        '400':
          description: Invalid input or duplicate supplier name

  /api/suppliers/{id}:
    get:
      tags:
        - Suppliers
      summary: Get supplier by ID
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Supplier ID
      responses:
        '200':
          description: Successfully retrieved supplier
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Supplier'
        '404':
          description: Supplier not found
    put:
      tags:
        - Suppliers
      summary: Update supplier
      description: Update an existing supplier (Admin, Manager only)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Supplier ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                contactPerson:
                  type: string
                phone:
                  type: string
                email:
                  type: string
                address:
                  type: string
      responses:
        '200':
          description: Supplier updated successfully
        '400':
          description: Invalid input
        '404':
          description: Supplier not found
    delete:
      tags:
        - Suppliers
      summary: Delete supplier
      description: Delete a supplier (Admin only). Cannot delete if supplier has active batches.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Supplier ID
      responses:
        '200':
          description: Supplier deleted successfully
        '400':
          description: Cannot delete - supplier has active batches
        '404':
          description: Supplier not found

  # ============================================================
  # FEATURE 2: INGREDIENTS (Updated with ingredientName)
  # ============================================================

  /api/ingredients:
    get:
      tags:
        - Ingredients
      summary: Get all ingredients
      description: Retrieve list of all raw materials and ingredients with total quantities
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: lowStock
          schema:
            type: boolean
          description: Filter ingredients below warning threshold
      responses:
        '200':
          description: Successfully retrieved ingredients
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Ingredient'
    post:
      tags:
        - Ingredients
      summary: Create ingredient
      description: Create a new ingredient (Admin, Kitchen_Manager only)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ingredientName
                - unit
                - costPrice
                - warningThreshold
              properties:
                ingredientName:
                  type: string
                  example: 'Flour'
                  description: 'Name of the ingredient (must be unique)'
                unit:
                  type: string
                  example: 'kg'
                  description: 'Unit of measurement (stored in lowercase)'
                costPrice:
                  type: number
                  example: 25000
                  description: 'Cost per unit in VND'
                warningThreshold:
                  type: number
                  example: 100
                  description: 'Low stock alert threshold'
                totalQuantity:
                  type: number
                  example: 0
                  description: 'Initial total quantity (default: 0, updated via batches)'
      responses:
        '201':
          description: Ingredient created successfully
        '400':
          description: Invalid input or duplicate ingredient name

  /api/ingredients/{id}:
    get:
      tags:
        - Ingredients
      summary: Get ingredient by ID
      description: Get detailed ingredient information including total quantity across all batches
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Ingredient ID
      responses:
        '200':
          description: Successfully retrieved ingredient
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Ingredient'
        '404':
          description: Ingredient not found
    put:
      tags:
        - Ingredients
      summary: Update ingredient
      description: Update an existing ingredient (Admin, Kitchen_Manager only)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Ingredient ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ingredientName:
                  type: string
                  example: 'Salted Egg Yolk'
                unit:
                  type: string
                  example: 'pcs'
                costPrice:
                  type: number
                  example: 5000
                warningThreshold:
                  type: number
                  example: 200
      responses:
        '200':
          description: Ingredient updated successfully
        '400':
          description: Invalid input or duplicate ingredient name
        '404':
          description: Ingredient not found
    delete:
      tags:
        - Ingredients
      summary: Delete ingredient
      description: Delete an ingredient (Admin, Kitchen_Manager only). Cannot delete if ingredient is used in product recipes or has active batches.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Ingredient ID
      responses:
        '200':
          description: Ingredient deleted successfully
        '400':
          description: Cannot delete - ingredient is used in recipes or has active batches
        '404':
          description: Ingredient not found

  # ============================================================
  # FEATURE 2: INGREDIENT BATCHES (Import & FEFO Tracking)
  # ============================================================
  /api/ingredients/{id}/batches:
    post:
      tags:
        - Ingredient Batches
      summary: Import ingredient batch (CRITICAL for Traceability)
      description: |
        Import a new batch of ingredients from a supplier. This creates full traceability from supplier to ingredient.
        The system automatically updates the parent ingredient's totalQuantity.
        
        **Traceability:** Supplier → Ingredient Batch → Ingredient
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Ingredient ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - supplierId
                - batchCode
                - initialQuantity
                - price
                - expiryDate
              properties:
                supplierId:
                  type: string
                  example: '60d5ec49f1b2c8b1f8e4e1a1'
                  description: 'REQUIRED: ID of the supplier providing this batch'
                batchCode:
                  type: string
                  example: 'IB-FLOUR-20260129-001'
                  description: 'Unique batch code (auto-uppercase)'
                initialQuantity:
                  type: number
                  example: 500
                  description: 'Quantity being imported'
                price:
                  type: number
                  example: 25000
                  description: 'Price per unit for this batch'
                expiryDate:
                  type: string
                  format: date
                  example: '2026-12-31'
                  description: 'Expiry date (must be in the future)'
                receivedDate:
                  type: string
                  format: date
                  example: '2026-01-29'
                  description: 'Date received (default: today)'
      responses:
        '201':
          description: Ingredient batch imported successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/IngredientBatch'
        '400':
          description: Invalid input (e.g., expiry date in past, duplicate batch code)
        '404':
          description: Ingredient or Supplier not found
    get:
      tags:
        - Ingredient Batches
      summary: Get all batches for an ingredient
      description: Retrieve all batches for a specific ingredient, sorted by expiry date (FEFO)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Ingredient ID
        - in: query
          name: activeOnly
          schema:
            type: boolean
            default: true
          description: Show only active batches
      responses:
        '200':
          description: Successfully retrieved batches
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/IngredientBatch'

  /api/ingredient-batches:
    get:
      tags:
        - Ingredient Batches
      summary: Get all ingredient batches
      description: Retrieve all ingredient batches with filtering options
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: supplierId
          schema:
            type: string
          description: Filter by supplier
        - in: query
          name: expiring
          schema:
            type: integer
          description: Filter batches expiring within X days
        - in: query
          name: isActive
          schema:
            type: boolean
          description: Filter by active status
      responses:
        '200':
          description: Successfully retrieved batches
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/IngredientBatch'

  /api/ingredient-batches/{id}:
    get:
      tags:
        - Ingredient Batches
      summary: Get ingredient batch by ID
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successfully retrieved batch
        '404':
          description: Batch not found
    put:
      tags:
        - Ingredient Batches
      summary: Update ingredient batch
      description: Update batch details (e.g., adjust quantity for corrections)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                currentQuantity:
                  type: number
                price:
                  type: number
                isActive:
                  type: boolean
      responses:
        '200':
          description: Batch updated successfully
        '404':
          description: Batch not found

  # ============================================================
  # INGREDIENT USAGE (Production Audit Log)
  # ============================================================
  /api/ingredient-usages:
    get:
      tags:
        - Production
      summary: Get ingredient usage history
      description: Retrieve the audit log of ingredient batch usage during production. Supports filtering by plan, product, ingredient, batch, and date range.
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: productionPlanId
          schema:
            type: string
          description: Filter by Production Plan ID
        - in: query
          name: productId
          schema:
            type: string
          description: Filter by Product ID
        - in: query
          name: ingredientId
          schema:
            type: string
          description: Filter by Ingredient ID
        - in: query
          name: ingredientBatchId
          schema:
            type: string
          description: Filter by Ingredient Batch ID
        - in: query
          name: startDate
          schema:
            type: string
            format: date
          description: 'Filter records on or after this date (inclusive, based on recordedAt)'
        - in: query
          name: endDate
          schema:
            type: string
            format: date
          description: 'Filter records on or before this date (inclusive, full day)'
      responses:
        '200':
          description: Successfully retrieved ingredient usage records
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  count:
                    type: integer
                    example: 5
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/IngredientUsage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ============================================================
  # FEATURE 3: PRODUCTS (with Recipe & Bundles)
  # ============================================================

  /api/products:
    get:
      tags:
        - Products
      summary: Get all products
      description: Retrieve list of all products with recipes and bundle information
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: categoryId
          schema:
            type: string
          description: Filter by category
      responses:
        '200':
          description: Successfully retrieved products
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
    post:
      tags:
        - Products
      summary: Create product
      description: |
        Create a new product with recipe (ingredients) or bundle items (other products).
        
        **Recipe Products:** Use `recipe` array with ingredientId and quantity per unit
        **Bundle Products:** Use `bundleItems` array with childProductId and quantity
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - sku
                - categoryId
                - price
                - shelfLifeDays
              properties:
                name:
                  type: string
                  example: 'Green Bean Mooncake'
                sku:
                  type: string
                  example: 'MOON-GB-001'
                  description: 'Unique product code'
                categoryId:
                  type: string
                  example: '60d5ec49f1b2c8b1f8e4e1a1'
                price:
                  type: number
                  example: 150000
                  description: 'Selling price in VND'
                shelfLifeDays:
                  type: number
                  example: 30
                  description: 'Shelf life in days (used to calculate expiry date)'
                image:
                  type: string
                  example: 'https://example.com/green-bean-mooncake.jpg'
                recipe:
                  type: array
                  description: 'Array of ingredients (for manufactured products)'
                  items:
                    type: object
                    properties:
                      ingredientId:
                        type: string
                      quantity:
                        type: number
                        description: 'Quantity per 1 unit of product'
                  example:
                    - ingredientId: '60d5ec49f1b2c8b1f8e4e1a2'
                      quantity: 0.05
                    - ingredientId: '60d5ec49f1b2c8b1f8e4e1a3'
                      quantity: 1
                bundleItems:
                  type: array
                  description: 'Array of child products (for bundle/combo products)'
                  items:
                    type: object
                    properties:
                      childProductId:
                        type: string
                      quantity:
                        type: number
                  example:
                    - childProductId: '60d5ec49f1b2c8b1f8e4e1a4'
                      quantity: 2
      responses:
        '201':
          description: Product created successfully
        '400':
          description: Invalid input or duplicate SKU

  /api/products/{id}:
    get:
      tags:
        - Products
      summary: Get product by ID
      description: Get detailed product information with populated recipe and bundle items
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Product ID
      responses:
        '200':
          description: Successfully retrieved product
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Product'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags:
        - Products
      summary: Update product
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                sku:
                  type: string
                categoryId:
                  type: string
                price:
                  type: number
                shelfLifeDays:
                  type: number
                image:
                  type: string
                recipe:
                  type: array
                bundleItems:
                  type: array
      responses:
        '200':
          description: Product updated successfully
        '404':
          description: Product not found
    delete:
      tags:
        - Products
      summary: Delete product
      description: Cannot delete if product is used in production plans or bundles
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product deleted successfully
        '400':
          description: Cannot delete - product is in use
        '404':
          description: Product not found

  # ============================================================
  # FEATURE 3: PRODUCTION PLANS (Manufacturing Schedule)
  # ============================================================
  /api/production-plans:
    get:
      tags:
        - Production Plans
      summary: Get all production plans
      description: Retrieve production plans with optional status filtering
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [Planned, In_Progress, Completed, Cancelled]
          description: Filter by plan status
        - in: query
          name: planDate
          schema:
            type: string
            format: date
          description: Filter by specific date
      responses:
        '200':
          description: Successfully retrieved plans
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductionPlan'
    post:
      tags:
        - Production Plans
      summary: Create production plan
      description: |
        Create a new production plan by aggregating a set of 'Approved' orders.
        
        **Workflow:**
        1. Coordinator provides a list of `orderIds` (all must be in 'Approved' status).
        2. System aggregates quantities across all order items per unique product.
        3. System auto-generates the `details` array from the aggregated data.
        4. All referenced orders are transitioned to 'Transferred_To_Kitchen' status.
        
        **Business Rule:**
        - The total accumulated quantity of all products across all selected orders MUST NOT exceed the system limit `MAX_PRODUCTS_PER_PLAN`.
        
        **Important:** Each plan creates a unique planCode and tracks planned vs actual quantities.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - planCode
                - orderIds
              properties:
                planCode:
                  type: string
                  example: 'PLAN-20260129-001'
                  description: 'Unique plan code'
                planDate:
                  type: string
                  format: date
                  example: '2026-01-29'
                  description: 'Planned production date (defaults to today if omitted)'
                note:
                  type: string
                  example: 'Production for Mid-Autumn Festival'
                orderIds:
                  type: array
                  description: 'Array of Approved order IDs to aggregate into this production plan'
                  minItems: 1
                  items:
                    type: string
                    description: 'Order ObjectId'
                  example: ['60d5ec49f1b2c8b1f8e4e1a9', '60d5ec49f1b2c8b1f8e4e1aa']
      responses:
        '201':
          description: Production plan created successfully and orders transitioned to Transferred_To_Kitchen
        '400':
          description: Invalid input, duplicate plan code, orders not Approved, or capacity limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                message: 'Vượt quá năng lực Bếp! Mẻ nấu này có tổng cộng 1200 sản phẩm, nhưng giới hạn hệ thống chỉ cho phép tối đa 1000 sản phẩm/mẻ.'
        '404':
          description: One or more orders not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                message: 'Orders not found: 60d5ec49f1b2c8b1f8e4e1a9'

  /api/production-plans/{id}:
    get:
      tags:
        - Production Plans
      summary: Get production plan by ID
