# ============================================================
# SYSTEM SETTINGS MANAGEMENT
# ============================================================
  /api/system-settings:
    get:
      tags:
        - System Settings
      summary: Get all system settings
      description: |
        Retrieve all system settings with optional filtering.
        
        **Access Control:**
        - If user is authenticated: Returns all settings
        - If not authenticated OR publicOnly=true: Returns only settings where isPublic=true
        
        **Use Case:** Mobile app fetches public settings without authentication. Admin fetches by Group.
      parameters:
        - in: query
          name: publicOnly
          schema:
            type: boolean
          description: 'If true, return only public settings'
          example: true
        - in: query
          name: group
          schema:
            type: string
            enum: [SYSTEM, FINANCE, DELIVERY, PRODUCTION, ORDER, INVENTORY, OTHER]
          description: 'Filter settings by group (e.g., DELIVERY, PRODUCTION)'
          example: 'DELIVERY'
      responses:
        '200':
          description: Successfully retrieved settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  count:
                    type: integer
                    example: 2
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SystemSetting'

    post:
      tags:
        - System Settings
      summary: Create a new system setting
      description: |
        Create a new global system setting.
        
        **Requirements:**
        - key and value are required
        - key will be automatically converted to uppercase
        - isPublic defaults to false if not specified
        
        **Access:** Admin only
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemSettingInput'
            example:
              key: 'MAX_ORDERS_PER_TRIP'
              value: '100'
              dataType: 'NUMBER'
              group: 'DELIVERY'
              description: 'Giới hạn tối đa 100 đơn/chuyến xe'
              isPublic: false
      responses:
        '201':
          description: System setting created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'System setting created successfully'
                  data:
                    $ref: '#/components/schemas/SystemSetting'
        '400':
          description: Invalid input or duplicate key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/system-settings/seed:
    post:
      tags:
        - System Settings
      summary: Seed default system settings
      description: |
        Automatically populate default system settings if they don't exist.
        Includes settings for Delivery, Production, and Finance.
        
        **Behavior:**
        - Only creates settings that don't already exist
        - Skips existing settings without updating them
        
        **Access:** Admin only
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Default settings seeded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Default settings seeded successfully'
                  data:
                    type: object
                    properties:
                      seeded:
                        type: array
                        items:
                          $ref: '#/components/schemas/SystemSetting'
                      skipped:
                        type: array
                        items:
                          type: string
                        example: ['TAX_RATE', 'MAX_ORDERS_PER_TRIP']
                      seededCount:
                        type: integer
                        example: 3
                      skippedCount:
                        type: integer
                        example: 2
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/system-settings/{key}:
    get:
      tags:
        - System Settings
      summary: Get a specific setting by key
      description: |
        Retrieve a single system setting by its key.
        
        **Access Control:**
        - Public settings (isPublic=true): Accessible without authentication
        - Private settings (isPublic=false): Requires authentication
      parameters:
        - in: path
          name: key
          required: true
          schema:
            type: string
          description: 'Setting key (case-insensitive)'
          example: 'MAX_ORDERS_PER_TRIP'
      responses:
        '200':
          description: Successfully retrieved setting
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/SystemSetting'
        '403':
          description: Forbidden - Setting is private and user not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: System setting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      tags:
        - System Settings
      summary: Update a system setting
      description: |
        Update an existing system setting.
        
        **Updatable Fields:** value, dataType, group, description, isPublic
        
        **Access:** Admin only
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: key
          required: true
          schema:
            type: string
          description: 'Setting key (case-insensitive)'
          example: 'MAX_ORDERS_PER_TRIP'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemSettingUpdate'
            example:
              value: '120'
              dataType: 'NUMBER'
              group: 'DELIVERY'
              description: 'Đã nâng giới hạn chở hàng'
              isPublic: false
      responses:
        '200':
          description: System setting updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'System setting updated successfully'
                  data:
                    $ref: '#/components/schemas/SystemSetting'
        '404':
          description: System setting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    delete:
      tags:
        - System Settings
      summary: Delete a system setting
      description: |
        Permanently delete a system setting from the database.
        
        **Access:** Admin only
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: key
          required: true
          schema:
            type: string
          description: 'Setting key (case-insensitive)'
          example: 'OLD_SETTING'
      responses:
        '200':
          description: System setting deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'System setting deleted successfully'
                  data:
                    $ref: '#/components/schemas/SystemSetting'
        '404':
          description: System setting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Enter your JWT token (obtained from /api/auth/login)

  schemas:
    # ============================================================
    # FEATURE 2: SUPPLIER SCHEMA
    # ============================================================
    Supplier:
      type: object
      properties:
        _id:
          type: string
          example: '60d5ec49f1b2c8b1f8e4e1a1'
        name:
          type: string
          example: 'Golden Harvest Supplier'
        contactPerson:
          type: string
          example: 'Nguyen Van A'
        phone:
          type: string
          example: '+84-28-12345678'
        email:
          type: string
          example: 'contact@goldenharvest.vn'
        address:
          type: string
          example: 'Industrial Zone, Binh Duong Province'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ============================================================
    # FEATURE 2: INGREDIENT SCHEMA (Updated)
    # ============================================================
    Ingredient:
      type: object
      properties:
        _id:
          type: string
        ingredientName:
          type: string
          example: 'Flour'
          description: 'Unique ingredient name'
        unit:
          type: string
          example: 'kg'
          description: 'Unit of measurement (stored in lowercase)'
        costPrice:
          type: number
          example: 25000
          description: 'Cost per unit in VND'
        warningThreshold:
          type: number
          example: 100
          description: 'Low stock alert threshold'
        totalQuantity:
          type: number
          example: 500
          description: 'Total quantity across all active batches'
        isBelowThreshold:
          type: boolean
          description: 'Virtual field: true if totalQuantity < warningThreshold'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ============================================================
    # FEATURE 2: INGREDIENT BATCH SCHEMA (New)
    # ============================================================
    IngredientBatch:
      type: object
      properties:
        _id:
          type: string
        ingredientId:
          type: string
          description: 'Reference to Ingredient'
        supplierId:
          type: string
          description: 'Reference to Supplier (CRITICAL for traceability)'
        batchCode:
          type: string
          example: 'IB-FLOUR-20260129-001'
          description: 'Unique batch code (auto-uppercase)'
        expiryDate:
          type: string
          format: date
          example: '2026-12-31'
          description: 'Expiry date (must be future date)'
        receivedDate:
          type: string
          format: date
          example: '2026-01-29'
          description: 'Date received from supplier'
        initialQuantity:
          type: number
          example: 500
          description: 'Original quantity when imported'
        currentQuantity:
          type: number
          example: 500
          description: 'Current remaining quantity'
        price:
          type: number
          example: 25000
          description: 'Price per unit for this batch'
        isActive:
          type: boolean
          default: true
          description: 'Batch is still usable'
        isExpired:
          type: boolean
          description: 'Virtual field: true if expiryDate < today'
        isEmpty:
          type: boolean
          description: 'Virtual field: true if currentQuantity <= 0'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ============================================================
    # INGREDIENT USAGE SCHEMA (Production Audit Log)
    # ============================================================
    IngredientUsage:
      type: object
      properties:
        _id:
          type: string
          example: '60d5ecb74f421b2d4c2c3e4f'
        productionPlanId:
          type: object
          description: 'Populated Production Plan reference'
          properties:
            _id:
              type: string
            planCode:
              type: string
              example: 'PP-2026-001'
        productId:
          type: object
          description: 'Populated Product reference'
          properties:
            _id:
              type: string
            name:
              type: string
              example: 'Bánh Nướng Đậu Xanh'
            sku:
              type: string
              example: 'BN-DX-001'
        ingredientId:
          type: object
          description: 'Populated Ingredient reference'
          properties:
            _id:
              type: string
            ingredientName:
              type: string
              example: 'Bột mì'
            unit:
              type: string
              example: 'kg'
        ingredientBatchId:
          type: object
          description: 'Populated Ingredient Batch reference (specific batch chosen by kitchen)'
          properties:
            _id:
              type: string
            batchCode:
              type: string
              example: 'IB-FLOUR-20260129-001'
        quantityUsed:
          type: number
          minimum: 0
          example: 12.5
          description: 'Amount of ingredient consumed from this batch'
        note:
          type: string
          nullable: true
          example: 'Used for making bean paste'
          description: 'Optional note about the usage'
        recordedAt:
          type: string
          format: date-time
          description: 'When the usage was recorded (may differ from createdAt if backdated)'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ============================================================
    # FEATURE 3: PRODUCT SCHEMA (with Recipe & Bundles)
    # ============================================================
    Product:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
          example: 'Green Bean Mooncake'
        sku:
          type: string
          example: 'MOON-GB-001'
          description: 'Unique product code'
        categoryId:
          type: string
          description: 'Reference to Category'
        price:
          type: number
          example: 150000
          description: 'Selling price in VND'
        unit:
          type: string
          example: 'Box'
          description: 'Unit of measurement for the finished product (e.g., Box, Piece, Set)'
        shelfLifeDays:
          type: number
          example: 30
          description: 'Shelf life in days'
        image:
          type: string
          example: 'https://example.com/mooncake.jpg'
        recipe:
          type: array
          description: 'Ingredients needed to make 1 unit'
          items:
            type: object
            properties:
              ingredientId:
                type: string
              quantity:
                type: number
                description: 'Quantity per 1 unit of product'
          example:
            - ingredientId: '60d5ec49f1b2c8b1f8e4e1a2'
              quantity: 0.05
            - ingredientId: '60d5ec49f1b2c8b1f8e4e1a3'
              quantity: 1
        bundleItems:
          type: array
          description: 'Child products for combo/bundle products'
          items:
            type: object
            properties:
              childProductId:
                type: string
              quantity:
                type: number
          example:
            - childProductId: '60d5ec49f1b2c8b1f8e4e1a4'
              quantity: 2
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ============================================================
    # FEATURE 3: PRODUCTION PLAN SCHEMA
    # ============================================================
    ProductionPlan:
      type: object
      properties:
        _id:
          type: string
        planCode:
          type: string
          example: 'PLAN-20260129-001'
          description: 'Unique plan code (auto-uppercase)'
        planDate:
          type: string
          format: date
          example: '2026-01-29'
          description: 'Planned production date'
        status:
          type: string
          enum: [Planned, In_Progress, Completed, Cancelled]
          example: 'Completed'
        note:
          type: string
          example: 'Production for Mid-Autumn Festival'
        details:
          type: array
          description: 'Products to be manufactured'
          items:
            type: object
            properties:
              productId:
                type: string
              plannedQuantity:
                type: number
                example: 100
              actualQuantity:
                type: number
                example: 100
              status:
                type: string
                enum: [Pending, In_Progress, Completed, Cancelled]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ============================================================
    # FEATURE 3: FINISHED BATCH SCHEMA (CRITICAL for Traceability)
    # ============================================================
    FinishedBatch:
      type: object
      required:
        - batchCode
        - productionPlanId
        - productId
        - mfgDate
        - expDate
        - initialQuantity
      properties:
        _id:
          type: string
        batchCode:
          type: string
          example: 'BATCH-20260129-MOON-GB-001'
          description: 'Unique batch code (auto-uppercase)'
        productionPlanId:
          type: string
          example: '60d5ec49f1b2c8b1f8e4e1a6'
          description: 'CRITICAL: Links batch back to production plan for traceability'
        productId:
          type: string
          example: '60d5ec49f1b2c8b1f8e4e1a5'
          description: 'Product being batched'
        mfgDate:
          type: string
          format: date
          example: '2026-01-29'
          description: 'Manufacturing date'
        expDate:
          type: string
          format: date
          example: '2026-02-28'
          description: 'Expiration date (must be after mfgDate)'
        initialQuantity:
          type: number
          example: 100
          description: 'Initial quantity produced'
        currentQuantity:
          type: number
          example: 80
          description: 'Current available quantity (after deliveries to stores)'
        status:
          type: string
          enum: [Active, SoldOut, Expired, Recalled]
          default: Active
          description: 'Batch status for inventory management'
        isExpired:
          type: boolean
          description: 'Virtual field: true if expDate < today'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ============================================================
    # FEATURE 4: LOGISTICS SCHEMAS
    # ============================================================
    Order:
      type: object
      required:
        - orderNumber
        - storeId
        - orderDate
        - requestedDeliveryDate
        - items
        - totalAmount
        - status
      properties:
        _id:
          type: string
        orderNumber:
          type: string
          example: 'ORD-20260130-001'
          description: 'Unique order number (auto-uppercase)'
        storeId:
          type: string
          description: 'Store placing the order'
        orderDate:
          type: string
          format: date-time
          example: '2026-01-30T00:00:00Z'
          description: 'Order creation date'
        requestedDeliveryDate:
          type: string
          format: date
          example: '2026-01-30'
          description: 'Requested delivery date'
          recipientName:
          type: string
          example: "Nguyễn Văn A"
        recipientPhone:
          type: string
          example: "0912345678"
        address:
          type: string
          example: "123 Lê Lợi, Quận 1, TP.HCM"
        items:
          type: array
          description: 'Items in the order'
          items:
            type: object
            required:
              - productId
              - quantityRequested
              - unitPrice
              - subtotal
            properties:
              productId:
                type: string
                description: 'Product reference'
              quantityRequested:
                type: number
                minimum: 1
                example: 20
                description: 'Quantity requested by store'
              quantity:
                type: number
                minimum: 0
                example: 20
                description: 'Quantity fulfilled (may differ from quantityRequested if stock limited)'
              batchId:
                type: string
                description: 'Optional: Finished batch reference (assigned during fulfillment)'
              unitPrice:
                type: number
                example: 150000
                description: 'Price per unit in VND (from Product collection)'
              subtotal:
                type: number
                example: 3000000
                description: 'Line total (quantity * unitPrice)'
        totalAmount:
          type: number
          example: 3000000
          description: 'Total order amount in VND'
        status:
          type: string
          enum: [Pending, Approved, Transferred_To_Kitchen, Ready_For_Shipping, In_Transit, Received, Cancelled]
          default: Pending
          description: 'Current order status. Workflow: Pending -> Approved -> Transferred_To_Kitchen -> Ready_For_Shipping -> In_Transit -> Received'
        approvedBy:
          type: string
          description: 'User ID who approved the order'
        approvedAt:
          type: string
          format: date-time
          description: 'Approval timestamp'
        notes:
          type: string
          description: 'Additional notes or instructions'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DeliveryTrip:
      type: object
      required:
        - orders
        - status
      properties:
        _id:
          type: string
          description: 'Trip ID'
          example: '60d5ec49f1b2c8b1f8e4e1d1'
        orders:
          type: array
          description: 'Array of Order IDs included in this delivery trip (CRITICAL: Multiple orders per trip)'
          items:
            type: string
            description: 'Order ObjectId'
          example: ['60d5ec49f1b2c8b1f8e4e1a9', '60d5ec49f1b2c8b1f8e4e1aa', '60d5ec49f1b2c8b1f8e4e1ab']
        status:
          type: string
          enum: [Planning, In_Transit, Completed, Cancelled]
          default: Planning
          description: 'Current trip status. Workflow: Planning -> In_Transit (shipping started) -> Completed (all orders received)'
        completedTime:
          type: string
          format: date-time
          description: 'Completion timestamp (set when all orders are received)'
          nullable: true
          example: '2026-02-05T09:30:00Z'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Invoice:
      type: object
      description: |
        Invoice for order billing. AUTO-GENERATED ONLY - system creates invoices when orders are approved or delivery trips are created.
        Manual invoice creation is prohibited to maintain financial data integrity.
      required:
        - invoiceNumber
        - orderId
        - storeId
        - invoiceDate
        - dueDate
        - subtotal
        - totalAmount
        - paymentStatus
      properties:
        _id:
          type: string
        invoiceNumber:
          type: string
          example: 'INV-20260130-001'
          description: 'Unique invoice number (auto-generated, auto-uppercase)'
        orderId:
          type: string
          description: 'Reference to Order (see Order schema). CRITICAL: Links invoice to specific order for traceability.'
          example: '60d5ec49f1b2c8b1f8e4e1a9'
        storeId:
          type: string
          description: 'Reference to Store (see Store schema). The store being billed for this order.'
          example: '60d5ec49f1b2c8b1f8e4e1a7'
        invoiceDate:
          type: string
          format: date
          example: '2026-01-30'
          description: 'Invoice issue date'
        dueDate:
          type: string
          format: date
          example: '2026-02-13'
          description: 'Payment due date'
        subtotal:
          type: number
          example: 3000000
          description: 'Order subtotal before tax'
        taxRate:
          type: number
          example: 8
          description: 'Tax rate percentage (0-100)'
        taxAmount:
          type: number
          example: 240000
          description: 'Calculated tax amount'
        totalAmount:
          type: number
          example: 3240000
          description: 'Total amount including tax'
        paymentStatus:
          type: string
          enum: [Pending, Partial, Paid, Overdue, Cancelled]
          default: Pending
          description: 'Current payment status'
        paidAmount:
          type: number
          default: 0
          description: 'Amount paid so far'
        paymentDate:
          type: string
          format: date
          description: 'Date payment was completed'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ============================================================
    # ADDITIONAL SCHEMAS
    # ============================================================
    Category:
      type: object
      properties:
        _id:
          type: string
        categoryName:
          type: string
          example: 'Mooncake'
        description:
          type: string
          example: 'Traditional and modern mooncake products'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Store:
      type: object
      properties:
        _id:
          type: string
        storeName:
          type: string
          example: 'Kendo Q1 Branch'
        storeCode:
          type: string
          example: 'KD-Q1'
        address:
          type: string
          example: '123 Nguyen Hue Street, District 1, HCMC'
        phone:
          type: string
          example: '+84-28-12345678'
        standardDeliveryMinutes:
          type: number
          example: 30
        status:
          type: string
          enum: [Active, Inactive]
          default: Active
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    StoreInventory:
      type: object
      required:
        - storeId
        - productId
        - batchId
        - quantity
      properties:
        _id:
          type: string
          example: '60d5ec49f1b2c8b1f8e4e1c1'
        storeId:
          type: string
          description: 'Reference to Store'
          example: '60d5ec49f1b2c8b1f8e4e1a7'
        productId:
          type: string
          description: 'Reference to Product'
          example: '60d5ec49f1b2c8b1f8e4e1a5'
        batchId:
          type: string
          description: 'Reference to Batch (finished goods batch for traceability)'
          example: '60d5ec49f1b2c8b1f8e4e1b5'
        quantity:
          type: number
          minimum: 0
          example: 50
          description: 'Current quantity in stock at this store'
        lastUpdated:
          type: string
          format: date-time
          description: 'Last update timestamp'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Feedback:
      type: object
      required:
        - orderId
        - rating
      properties:
        _id:
          type: string
          example: '60d5ec49f1b2c8b1f8e4e1a9'
        orderId:
          type: string
          example: '60d5ec49f1b2c8b1f8e4e1a8'
          description: 'Reference to Order'
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 5
          description: 'Rating from 1 (poor) to 5 (excellent)'
        content:
          type: string
          example: 'Great quality mooncakes, delivered on time!'
          description: 'Feedback comment'
        images:
          type: array
          items:
            type: string
          example: ['https://example.com/image1.jpg', 'https://example.com/image2.jpg']
          description: 'Array of image URLs'
        createdBy:
          type: string
          description: 'Reference to User who created the feedback'
        createdAt:
          type: string
          format: date-time
          example: '2026-02-05T10:30:00.000Z'
        updatedAt:
          type: string
          format: date-time

    Wallet:
      type: object
      required:
        - storeId
      properties:
        _id:
          type: string
          example: '60d5ec49f1b2c8b1f8e4e1b1'
        storeId:
          type: string
          description: 'Reference to Store. Each store has one unique wallet.'
          example: '60d5ec49f1b2c8b1f8e4e1a7'
        balance:
          type: number
          default: 0
          minimum: 0
          example: 5000000
          description: 'Current wallet balance in VND. Cannot be negative.'
        status:
          type: string
          enum: [Active, Locked]
          default: Active
          description: 'Wallet status. Locked wallets cannot be used for payments.'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WalletTransaction:
      type: object
      required:
        - walletId
        - amount
        - type
      properties:
        _id:
          type: string
          example: '60d5ec49f1b2c8b1f8e4e1b2'
        walletId:
          type: string
          description: 'Reference to Wallet'
          example: '60d5ec49f1b2c8b1f8e4e1b1'
        orderId:
          type: string
          description: 'Reference to Order (optional, for Payment and Refund types)'
          example: '60d5ec49f1b2c8b1f8e4e1a9'
        amount:
          type: number
          example: 500000
          description: 'Transaction amount in VND. Positive for credits (Deposit, Refund), negative for debits treated as positive in display.'
        type:
          type: string
          enum: [Deposit, Withdrawal, Refund, Payment]
          description: |
            Transaction type:
            - Deposit: Add funds to wallet (positive amount)
            - Withdrawal: Remove funds from wallet (amount treated as positive in logic)
            - Refund: Return funds for rejected order (positive amount)
            - Payment: Use wallet funds for order (amount treated as positive in logic)
          example: 'Deposit'
        description:
          type: string
          example: 'Admin deposit for Store Q1'
          description: 'Transaction description or memo'
        timestamp:
          type: string
          format: date-time
          description: 'Transaction timestamp'
          example: '2026-01-30T14:30:00.000Z'

    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: 'Error message description'
        error:
          type: string

    VehicleType:
      type: object
      properties:
        _id:
          type: string
          example: '65e2f1a2b3c4d5e6f7a8b9c0'
        name:
          type: string
          example: 'Xe tải 1.5 Tấn'
        capacity:               # <-- Nó nằm ở đây nè
          type: number
          example: 1500
        unit:                   # <-- Và ở đây nữa
          type: string
          example: 'kg'
        description:
          type: string
          example: 'Chuyên chở hàng đông lạnh nội thành'
        isActive:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
          example: '2026-03-12T12:45:22.951Z'
        updatedAt:
          type: string
          format: date-time
          example: '2026-03-12T12:45:22.951Z'

    VehicleTypeInput:
      type: object
      required:
        - name
        - capacity
      properties:
        name:
          type: string
          example: 'Xe bán tải Ford Ranger'
        capacity:
          type: number
          example: 800
        unit:
          type: string
          enum: ['kg', 'ton', 'box']
          default: 'kg'
          example: 'kg'
        description:
          type: string
          example: 'Dùng để giao hỏa tốc nội thành'

    VehicleTypeUpdate:
      type: object
      properties:
        name:
          type: string
          example: 'Xe tải 2 Tấn'
        capacity:
          type: number
          example: 2000
        unit:
          type: string
          enum: ['kg', 'ton', 'box']
          example: 'kg'
        description:
          type: string
          example: 'Đã nâng cấp thùng xe'
        isActive:
          type: boolean
          example: true
    # ============================================================
    # SYSTEM SETTINGS SCHEMAS
    # ============================================================
    SystemSetting:
      type: object
      required:
        - key
        - value
      properties:
        _id:
          type: string
          example: '60d5ec49f1b2c8b1f8e4e1a1'
        key:
          type: string
          description: 'Unique setting key in uppercase (e.g., SHIPPING_COST_BASE)'
          example: 'SHIPPING_COST_BASE'
        value:
          type: string
          description: 'Setting value (stored as string)'
          example: '50000'
        dataType:
          type: string
          enum: [STRING, NUMBER, BOOLEAN, JSON]
          description: 'Data type for frontend rendering and backend parsing'
          example: 'NUMBER'
        group:
          type: string
          enum: [SYSTEM, FINANCE, DELIVERY, PRODUCTION, ORDER, INVENTORY, OTHER]
          description: 'Grouping category for admin dashboard tabs'
          example: 'DELIVERY'
        description:
          type: string
          description: 'Human-readable description of the setting'
          example: 'Base shipping cost for deliveries (VND)'
        isPublic:
          type: boolean
          description: 'Whether this setting is publicly accessible without authentication'
          default: false
          example: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SystemSettingInput:
      type: object
      required:
        - key
        - value
      properties:
        key:
          type: string
          description: 'Setting key (will be converted to uppercase)'
          example: 'MAX_ORDERS_PER_TRIP'
        value:
          type: string
          description: 'Setting value'
          example: '100'
        dataType:
          type: string
          enum: [STRING, NUMBER, BOOLEAN, JSON]
          example: 'NUMBER'
        group:
          type: string
          enum: [SYSTEM, FINANCE, DELIVERY, PRODUCTION, ORDER, INVENTORY, OTHER]
          example: 'DELIVERY'
        description:
          type: string
          description: 'Description of the setting'
          example: 'Giới hạn đơn tối đa trên 1 chuyến xe'
        isPublic:
          type: boolean
          default: false
          example: false

    SystemSettingUpdate:
      type: object
      properties:
        value:
          type: string
          description: 'New value for the setting'
          example: '120'
        dataType:
          type: string
          enum: [STRING, NUMBER, BOOLEAN, JSON]
          example: 'NUMBER'
        group:
          type: string
          enum: [SYSTEM, FINANCE, DELIVERY, PRODUCTION, ORDER, INVENTORY, OTHER]
          example: 'DELIVERY'
        description:
          type: string
          description: 'Updated description'
          example: 'Đã tăng giới hạn lên 120 đơn'
        isPublic:
          type: boolean
          example: false

    IngredientRequest:
      type: object
      properties:
        _id:
          type: string
        ingredientId:
          type: string
        quantityRequested:
          type: number
        unit:
          type: string
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED, COMPLETED]
        note:
          type: string
        actualCost:
          type: number
        requestedBy:
          type: string
        approvedBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    IngredientRequestInput:
      type: object
      required:
        - ingredientId
        - quantityRequested
      properties:
        ingredientId:
          type: string
          description: MongoDB ObjectId of the ingredient
        quantityRequested:
          type: number
        unit:
          type: string
          default: "kg"
        note:
          type: string
          description: Reason for requesting

    IngredientRequestStatusUpdate:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [APPROVED, REJECTED]
          description: Target status

    IngredientRequestComplete:
      type: object
      required:
        - actualCost
      properties:
        actualCost:
          type: number
          description: The actual money spent to buy the ingredients (in VND)

  # ============================================================
  # REUSABLE RESPONSES
  # ============================================================
  responses:
    Unauthorized:
      description: Unauthorized - Invalid or missing authentication token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            success: false
            message: 'Not authorized, token failed'
    
    Forbidden:
      description: Forbidden - User does not have required permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            success: false
            message: 'Not authorized as Admin'
    
    BadRequest:
      description: Bad Request - Invalid input data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    NotFound:
      description: Not Found - Resource does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    