                  description: 'New status for the production plan'
                  example: 'In_Progress'
      responses:
        '200':
          description: Production plan status updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Production plan status updated successfully'
                  data:
                    $ref: '#/components/schemas/ProductionPlan'
        '400':
          description: Invalid status or validation error (e.g., cannot mark as Completed when items are not completed)
        '404':
          description: Production plan not found

  /api/production-plans/{planId}/complete-item:
    post:
      tags:
        - Production
      summary: Complete production item and create finished batch
      description: |
        Mark a production item as complete. Kitchen staff manually selects which ingredient batches were used.
        
        **Workflow:**
        1. Kitchen staff selects batches and quantities from the `usedIngredients` array.
        2. System validates each batch has sufficient quantity.
        3. System deducts quantities from the selected batches and updates parent ingredient totals.
        4. System creates an `IngredientUsage` audit record for each batch used.
        5. System creates a new Finished Goods Batch linked to this production plan.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: planId
          required: true
          schema:
            type: string
          description: Production Plan ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - productId
                - actualQuantity
                - usedIngredients
              properties:
                productId:
                  type: string
                  example: '60d5ec49f1b2c8b1f8e4e1a5'
                actualQuantity:
                  type: number
                  example: 100
                  description: 'Actual quantity of finished products produced'
                usedIngredients:
                  type: array
                  description: 'Ingredient batches manually selected by kitchen staff'
                  minItems: 1
                  items:
                    type: object
                    required:
                      - ingredientBatchId
                      - quantityUsed
                    properties:
                      ingredientBatchId:
                        type: string
                        example: '60d5ecb74f421b2d4c2c3e4f'
                        description: 'ID of the specific IngredientBatch chosen by the kitchen'
                      quantityUsed:
                        type: number
                        minimum: 0
                        example: 12.5
                        description: 'Amount consumed from this batch'
                      note:
                        type: string
                        nullable: true
                        example: 'Used for making bean paste'
                        description: 'Optional note about this specific usage'
      responses:
        '201':
          description: Item completed, ingredients deducted, and batch created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Production item completed successfully'
                  data:
                    type: object
                    properties:
                      plan:
                        $ref: '#/components/schemas/ProductionPlan'
                      batch:
                        $ref: '#/components/schemas/FinishedBatch'
                      traceability:
                        type: object
                        properties:
                          ingredientBatchesUsed:
                            type: array
                            items:
                              type: object
                              properties:
                                ingredientBatchId:
                                  type: string
                                quantityUsed:
                                  type: number
                                ingredientName:
                                  type: string
                                batchCode:
                                  type: string
                          message:
                            type: string
                            example: 'Ingredients deducted using FEFO logic'
        '400':
          description: Invalid input, already completed, or Insufficient ingredient stock
        '404':
          description: Plan or product not found

