          description: Order approved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Order approved successfully. Awaiting production by the kitchen.'
                  data:
                    type: object
                    properties:
                      order:
                        $ref: '#/components/schemas/Order'
                      invoice:
                        $ref: '#/components/schemas/Invoice'
