  # FEATURE 4: LOGISTICS & SUPPLY CHAIN
  # ============================================================
  /api/logistics/orders:
    get:
      tags:
        - Logistics
      summary: Get all orders
      description: |
        Retrieve all orders with optional status filtering.
        
        **Use Case:** Mobile app can filter by 'Received' status to show orders eligible for feedback.
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [Pending, Approved, Transferred_To_Kitchen, Ready_For_Shipping, In_Transit, Received, Cancelled]
          description: 'Filter orders by their current status (e.g., Received)'
      responses:
        '200':
          description: Successfully retrieved orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'

    post: # <--- QUAN TRỌNG: post phải thẳng hàng với get ở trên
      tags:
        - Logistics
      summary: Create new order
      description: |
        Create a new order from a store to the central kitchen.
        
        **Payment Methods:**
        - 'Wallet': Deduct from store's prepaid wallet balance
        - 'PayOS': Generate invoice for later payment
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - storeId
                - requestedDeliveryDate
                - recipientName
                - recipientPhone
                - items
              properties:
                storeId:
                  type: string
                  example: '60d5ec49f1b2c8b1f8e4e1a7'
                requestedDeliveryDate:
                  type: string
                  format: date
                  example: '2026-02-05'
                recipientName:
                  type: string
                  example: 'Nguyễn Văn A'
                recipientPhone:
                  type: string
                  pattern: '^(0|\+84)[0-9]{9,10}$'
                  example: '0912345678'
                address:
                  type: string
                  example: '123 Lê Lợi, Quận 1, TP.HCM'
                items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                      - productId
                      - quantityRequested
                    properties:
                      productId:
                        type: string
                        example: '60d5ec49f1b2c8b1f8e4e1a5'
                      quantityRequested:
                        type: number
                        minimum: 1
                        example: 20
                notes:
                  type: string
                  maxLength: 500
                paymentMethod:
                  type: string
                  enum: [Wallet, PayOS]
                  default: PayOS
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Order'
        '400':
          description: Invalid input
        '403':
          description: Wallet locked or unauthorized
        '404':
          description: Store or Product not found

