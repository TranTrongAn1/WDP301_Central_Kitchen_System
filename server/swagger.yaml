  /api/logistics/orders/{orderId}/approve:
    post:
      tags:
        - Logistics
      summary: Approve order for production
      description: |
        Approve a pending order. Changes status from Pending to Approved and updates invoice due date. No inventory deduction happens here anymore.
      security:
