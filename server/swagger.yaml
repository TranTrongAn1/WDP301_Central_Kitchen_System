      description: |
        Cập nhật trạng thái đơn hàng. 
        **Đặc biệt:** Khi status chuyển sang `Received`, hệ thống sẽ tự động cộng số lượng sản phẩm vào kho của cửa hàng (`StoreInventory`) dựa trên các `batchId` có trong đơn hàng.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
          description: ID của đơn hàng cần cập nhật
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [Pending, Approved, Shipped, Received, Cancelled]
                  example: Received
      responses:
        '200':
          description: Cập nhật thành công. Nếu là "Received", kho đã được cộng dồn.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: "Order received and inventory updated"
        '404':
