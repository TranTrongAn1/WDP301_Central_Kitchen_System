  /api/logistics/orders/{orderId}/reject:
    post:
      tags:
        - Logistics
      summary: Reject/Cancel order with reason
      description: |
        Cancel an order with a cancellation reason.
        
        **Automatic Actions:**
        - Reverses inventory for orders in Approved, Transferred_To_Kitchen, Ready_For_Shipping, or In_Transit status
        - Automatically refunds payment to Store's Wallet if order was paid using Wallet payment method
        - Sets order status to 'Cancelled'
        
        **Requirements:**
        - Order must not already be in 'Received' or 'Cancelled' status
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
          description: Order ID to reject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
                  description: Reason for cancelling the order
                  example: 'Insufficient inventory to fulfill order'
      responses:
        '200':
          description: Order cancelled successfully
        '400':
          description: Cannot cancel - order not in Pending status
        '404':
          description: Order not found

  /api/logistics/orders/{orderId}/receive:
    post:
      tags:
        - Logistics
      summary: Receive order at store
      description: |
        Mark an order as received by the store (QR scan or manual confirmation).
        Updates store inventory and transitions order status to "Received".
        When all orders in a delivery trip are received, the trip status is updated to "Completed".
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
          description: Order ID to receive
      responses:
        '200':
          description: Order received successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  order:
                    $ref: '#/components/schemas/Order'
                  deliveryTrip:
                    $ref: '#/components/schemas/DeliveryTrip'
                  storeInventories:
                    type: array
                    items:
                      $ref: '#/components/schemas/StoreInventory'
        '400':
          description: Invalid operation (e.g., order not shipped yet)
        '404':
          description: Order or delivery trip not found

  /api/logistics/trips/create:
    post:
      tags:
        - Logistics
      summary: Create delivery trip from multiple approved orders
      description: |
        Create a new delivery trip that groups multiple approved orders into a single shipment.
        
        **NEW WORKFLOW:**
        1. Manager reviews multiple 'Approved' orders
        2. Groups them into a single delivery trip
        3. All orders transition from 'Approved' to 'In_Transit'
        
        **Traceability:** Trip → Multiple Orders → Store Inventory
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - orderIds
              properties:
                orderIds:
                  type: array
                  description: 'Array of order IDs to include in this delivery trip (all must have "Ready_For_Shipping" status)'
                  minItems: 1
                  items:
                    type: string
                    description: 'Order ObjectId'
                  example: ['60d5ec49f1b2c8b1f8e4e1a9', '60d5ec49f1b2c8b1f8e4e1aa', '60d5ec49f1b2c8b1f8e4e1ab']
                vehicleTypeId:
                  type: string
                  description: 'ID of the vehicle type assigned to this trip'
                  example: '60d5ec49f1b2c8b1f8e4e1ff'
                notes:
                  type: string
                  description: 'Optional instructions for the driver'
                  example: 'Handle with care. Deliver to back entrance.'
            example:
              orderIds: ['60d5ec49f1b2c8b1f8e4e1a9', '60d5ec49f1b2c8b1f8e4e1aa']
              vehicleTypeId: '60d5ec49f1b2c8b1f8e4e1ff'
              notes: 'Handle with care. Deliver to back entrance.'
      responses:
        '201':
          description: Delivery trip created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Delivery trip created successfully with 3 orders in Planning status.'
                  data:
                    type: object
                    properties:
                      trip:
                        $ref: '#/components/schemas/DeliveryTrip'
                      totalOrders:
                        type: integer
                        example: 3
        '400':
          description: Bad Request (Invalid input or orders not in "Ready_For_Shipping" status)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                message: "All orders must have 'Ready_For_Shipping' status. Invalid orders: ORD-1234"
        '404':
          description: One or more orders not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                message: 'One or more orders not found'

  /api/logistics/trips:
    get:
      tags:
        - Logistics
      summary: Get all delivery trips
      description: |
        Retrieve all delivery trips with optional filtering.
        
        **TRACEABILITY:** Each trip contains multiple orders that were grouped for delivery.
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [Planning, In_Transit, Completed, Cancelled]
          description: Filter by trip status
      responses:
        '200':
          description: Successfully retrieved delivery trips
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DeliveryTrip'

  /api/logistics/trips/{id}:
    get:
      tags:
        - Logistics
      summary: Get delivery trip by ID
      description: Retrieve detailed delivery trip information with all associated orders
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Delivery Trip ID
      responses:
        '200':
          description: Successfully retrieved delivery trip
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/DeliveryTrip'
        '404':
          description: Delivery trip not found

    patch:
      tags:
        - Logistics
      summary: Update delivery trip
      description: |
        Update `vehicleType` and/or `notes` for a delivery trip.
        
        **Allowed statuses:** `Planning`, `Ready_For_Shipping`
        
        **Blocked statuses:** `In_Transit`, `Completed` — returns 400 to prevent changes to an active or finalized shipment.
        
        **Access:** Coordinator, Manager, Admin only
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Delivery Trip ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                vehicleTypeId:
                  type: string
                  example: '60d5ec49f1b2c8b1f8e4e1a5'
                  description: 'ID of the VehicleType to assign to this trip'
                notes:
                  type: string
                  maxLength: 500
                  example: 'Handle with care — mooncakes are fragile'
      responses:
        '200':
          description: Delivery trip updated successfully
        '400':
          description: Cannot update — trip is In_Transit or Completed
        '404':
          description: Delivery trip not found

    delete:
      tags:
        - Logistics
      summary: Hard delete delivery trip
      description: |
        **Hard Delete:** Completely removes the DeliveryTrip document from the database.
        
        **IMPORTANT - Order Preservation:**
        - Associated orders are NOT modified and remain in their current status
        - Orders remain in the database exactly as they were before deletion
        - This only removes the trip grouping, not the orders themselves
        
        **Constraint:**
        - Deletion is ONLY allowed if the trip status is 'Planning'
        - If the trip has moved to 'Transferred_To_Kitchen' or any further status, deletion is blocked to prevent data inconsistency in the production flow
        
        **Use Case:** Remove a delivery trip during the planning phase if it was created in error or needs to be reorganized.
        
        **Access:** Coordinator, Manager, Admin only
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Delivery Trip ID
      responses:
        '200':
          description: Delivery trip deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Delivery trip deleted successfully. Associated orders remain unchanged.'
                  data:
                    type: object
                    properties:
                      deletedTripId:
                        type: string
                        example: '60d5ec49f1b2c8b1f8e4e1a1'
                      deletedTripNumber:
                        type: string
                        example: 'TRIP-1709337600000'
                      orderCount:
                        type: integer
                        example: 3
        '400':
          description: Cannot delete - trip is not in Planning status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Cannot delete delivery trip. Deletion is only allowed for trips in 'Planning' status. Current status: 'In_Transit'"
        '404':
          description: Delivery trip not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Delivery trip not found'

  /api/logistics/trips/{id}/add-orders:
    patch:
      tags:
        - Logistics
      summary: Add orders to delivery trip
      description: |
        Add multiple 'Ready_For_Shipping' orders to an existing delivery trip (Planning phase).
        
        **Requirements:**
        - Trip must be in 'Planning' status
        - All orders must have 'Ready_For_Shipping' status
        - Duplicate order IDs are automatically prevented
        
        **Workflow:** Coordinator builds trip by adding ready-for-shipping orders one by one or in batches.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Delivery Trip ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - orderIds
              properties:
                orderIds:
                  type: array
                  items:
                    type: string
                  description: 'Array of Order IDs to add to the trip'
                  example: ['60d5ec49f1b2c8b1f8e4e1a9', '60d5ec49f1b2c8b1f8e4e1aa']
      responses:
        '200':
          description: Orders added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: 'Added 2 orders to delivery trip (1 duplicates skipped)'
                  data:
                    type: object
                    properties:
                      trip:
                        $ref: '#/components/schemas/DeliveryTrip'
                      ordersAdded:
                        type: integer
                        example: 2
                      duplicatesSkipped:
                        type: integer
                        example: 1
        '400':
          description: Bad Request (Invalid input, trip not in Planning, or orders not Ready_For_Shipping)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                message: "Cannot add orders to trip with status 'In_Transit'. Only 'Planning' trips can be modified."
        '404':
          description: Delivery trip or orders not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                message: 'Delivery trip not found'

  /api/logistics/trips/{id}/remove-orders:
    patch:
      tags:
        - Logistics
      summary: Remove orders from delivery trip
      description: |
        Remove specific orders from a delivery trip and set them back to 'Ready_For_Shipping' status.
        
        **Requirements:**
        - Trip must NOT be 'In_Transit' or 'Completed'
        - Removed orders are set back to 'Ready_For_Shipping' (not rejected)
        
        **Use Case:** Coordinator adjusts trip composition during planning phase.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Delivery Trip ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - orderIds
              properties:
                orderIds:
                  type: array
                  items:
                    type: string
                  description: 'Array of Order IDs to remove from the trip'
                  example: ['60d5ec49f1b2c8b1f8e4e1a9']
      responses:
        '200':
          description: Orders removed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: 'Removed 1 orders from delivery trip. Orders set back to Ready_For_Shipping status for reassignment.'
                  data:
                    type: object
                    properties:
                      trip:
                        $ref: '#/components/schemas/DeliveryTrip'
                      ordersRemoved:
                        type: integer
                        example: 1
                      ordersUpdated:
                        type: integer
                        example: 1
                      remainingOrders:
                        type: integer
                        example: 2
        '400':
          description: Invalid operation (e.g., trip is In_Transit or Completed)
        '404':
          description: Delivery trip not found

  /api/logistics/trips/{id}/start-shipping:
    post:
      tags:
        - Logistics
      summary: Start shipping process
      description: |
        Start the actual shipping process, moving the trip and all its orders directly to in-transit status.
        
        **Actions:**
        - Updates trip status from 'Planning' to 'In_Transit'
        - Updates all orders in trip to 'In_Transit' status
        - Sets shippedDate timestamp for all orders
        - Sets trip departureTime timestamp
        - Deducts stock quantities from FinishedBatches
        
        **Requirements:**
        - Trip must be in 'Planning' status
        
        **Business Rule:**
        - The trip MUST have at least the minimum required orders (`MIN_ORDERS_PER_TRIP`) to depart.
        
        **Workflow:** Coordinator dispatches the truck directly from Planning. No kitchen handoff step required.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Delivery Trip ID
      responses:
        '200':
          description: Shipping started successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: "Shipping started successfully. 3 orders moved to 'In_Transit' status."
                  data:
                    type: object
                    properties:
                      trip:
                        $ref: '#/components/schemas/DeliveryTrip'
                      ordersUpdated:
                        type: integer
                        example: 3
                      shippedDate:
                        type: string
                        format: date-time
                        example: '2026-02-05T12:00:00Z'
                      totalOrders:
                        type: integer
                        example: 3
        '400':
          description: Bad Request (Invalid operation, trip not in Planning, or minimum orders not met)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                message: 'Cannot start shipping. A trip requires at least 5 orders to depart. Currently has 2 order(s).'
        '404':
          description: Delivery trip not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                message: 'Delivery trip not found'

  /api/logistics/invoices:
    get:
      tags:
        - Logistics
      summary: Get all invoices
      description: |
        Retrieve all invoices with optional filtering.
        
        **IMPORTANT:** Invoices are automatically generated by the system when:
        - An Order is approved, OR
        - A Delivery Trip is created
        
        Manual invoice creation is NOT allowed to ensure data consistency and prevent billing errors.
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: paymentStatus
          schema:
            type: string
            enum: [Pending, Partial, Paid, Overdue, Cancelled]
          description: Filter by payment status
        - in: query
          name: storeId
          schema:
            type: string
          description: Filter by store
        - in: query
          name: orderId
          schema:
            type: string
          description: Filter by order
      responses:
        '200':
          description: Successfully retrieved invoices
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Invoice'

  /api/logistics/invoices/{id}:
    get:
      tags:
        - Logistics
      summary: Get invoice by ID
      description: Retrieve detailed invoice information
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successfully retrieved invoice
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Invoice'
        '404':
          description: Invoice not found

  /api/logistics/invoices/{id}/payment:
    post:
      tags:
        - Logistics
      summary: Record payment
      description: Record a payment against an invoice (full or partial)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
              properties:
                amount:
                  type: number
                  description: 'Payment amount'
                paymentDate:
                  type: string
                  format: date
                  description: 'Payment date (default: today)'
                paymentMethod:
                  type: string
                  description: 'Payment method description'
      responses:
        '200':
          description: Payment recorded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Invoice'
        '400':
          description: Invalid amount or invoice already paid
        '404':
          description: Invoice not found

  # ============================================================
  # PAYMENT GATEWAY (PayOS Integration)
  # ============================================================
  /api/payment/wallet/{storeId}:
    get:
      tags:
        - Payment
      summary: Get store wallet balance and transaction history
      description: |
        Retrieve the current wallet balance and transaction history for a specific store.
        
        **Returns:**
        - Current balance
        - Wallet status (Active/Locked)
        - Complete transaction history with type, amount, and timestamps
        
        **Access:** Store staff can view their own store's wallet, Admin can view any wallet
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: storeId
          required: true
          schema:
            type: string
          description: Store ID
      responses:
        '200':
          description: Successfully retrieved wallet information
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      wallet:
                        $ref: '#/components/schemas/Wallet'
                      transactions:
                        type: array
                        items:
                          $ref: '#/components/schemas/WalletTransaction'
        '404':
          description: Wallet not found for this store
        '403':
          description: Unauthorized - Cannot view other store's wallet

  /api/payment/deposit:
    post:
      tags:
        - Payment
      summary: Deposit funds to store wallet
      description: |
        Add funds to a store's wallet for prepaid order payments.
        This is a top-up operation that increases the wallet balance.
        
        **Requirements:**
        - User must be Admin to deposit funds
        - Wallet must be in Active status
        - Amount must be positive
        
        **Transaction:** Uses Mongoose session for atomic balance update with transaction logging.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - storeId
                - amount
              properties:
                storeId:
                  type: string
                  description: Store ID to deposit funds to
                  example: '60d5ec49f1b2c8b1f8e4e1a7'
                amount:
                  type: number
                  minimum: 0.01
                  description: Amount to deposit in VND (must be positive)
                  example: 5000000
                description:
                  type: string
                  description: Optional memo for this deposit transaction
                  example: 'Monthly wallet top-up'
      responses:
        '200':
          description: Deposit successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Deposit successful'
                  data:
                    type: object
                    properties:
                      wallet:
                        $ref: '#/components/schemas/Wallet'
                      transaction:
                        $ref: '#/components/schemas/WalletTransaction'
        '400':
          description: Invalid input (e.g., negative amount, locked wallet)
        '403':
          description: Unauthorized - Only Admin can deposit
        '404':
          description: Store or wallet not found

  /api/payment/pay-with-wallet:
    post:
      tags:
        - Payment
      summary: Pay invoice using store wallet balance
      description: |
        Deduct funds from the store's wallet to pay an invoice.
        This is an internal payment method that immediately settles the invoice.
        
        **Requirements:**
        - Invoice must exist and not be paid
        - Wallet must be Active (not Locked)
        - Wallet balance must be sufficient to cover invoice amount
        
        **Actions:**
        - Deducts invoice total from wallet balance
        - Marks invoice as 'Paid'
        - Creates WalletTransaction record with type 'Payment'
        
        **Transaction:** Uses Mongoose session for atomic operation ensuring data consistency.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - invoiceId
              properties:
                invoiceId:
                  type: string
                  description: Invoice ID to pay with wallet
                  example: '60d5ec49f1b2c8b1f8e4e1a9'
      responses:
        '200':
          description: Payment successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Payment successful'
                  data:
                    type: object
                    properties:
                      invoice:
                        type: object
                        properties:
                          id:
                            type: string
                          invoiceNumber:
                            type: string
                          paymentStatus:
                            type: string
                            example: 'Paid'
                          paidAmount:
                            type: number
                          paymentDate:
                            type: string
                            format: date-time
                      wallet:
                        type: object
                        properties:
                          id:
                            type: string
                          storeId:
                            type: string
                          newBalance:
                            type: number
                      transaction:
                        $ref: '#/components/schemas/WalletTransaction'
        '400':
          description: Invalid request (invoice already paid or insufficient balance)
        '403':
          description: Wallet is locked
        '404':
          description: Invoice or wallet not found

  /api/payment/create-link:
    post:
      tags:
        - Payment
      summary: Create PayOS payment link for an invoice
      description: |
        Generate a payment link using PayOS gateway for a specific invoice.
        Returns a checkout URL and QR code that can be used for payment.
        
        **Security:** Requires authentication to prevent unauthorized payment link creation.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - invoiceId
              properties:
                invoiceId:
                  type: string
                  description: Invoice ID to create payment link for
                  example: '60d5ec49f1b2c8b1f8e4e1a9'
      responses:
        '200':
          description: Payment link created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Payment link created successfully'
                  data:
                    type: object
                    properties:
                      checkoutUrl:
                        type: string
                        description: PayOS checkout URL for payment
                        example: 'https://pay.payos.vn/web/aGlzdG9yeS8...'
                      qrCode:
                        type: string
                        description: QR code image URL for payment
                        example: 'https://img.vietqr.io/image/...'
                      orderCode:
                        type: number
                        description: Unique numeric order code for PayOS
                        example: 123456789
                      amount:
                        type: number
                        description: Total payment amount
                        example: 3240000
                      invoiceNumber:
                        type: string
                        description: Invoice number reference
                        example: 'INV-20260130-001'
        '400':
          description: Invalid request or invoice already paid
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Invoice is already paid'
        '404':
          description: Invoice not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Invoice not found'

  /api/payment/webhook:
    post:
      tags:
        - Payment
      summary: PayOS webhook for payment status updates
      description: |
        Public endpoint for PayOS to send payment confirmation webhooks.
        This endpoint verifies the webhook signature and updates invoice payment status.
        
        **IMPORTANT:** This endpoint is PUBLIC (no authentication required) as it is called by PayOS servers.
        The webhook data is verified using PayOS checksum validation before processing.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: PayOS webhook data payload
              properties:
                code:
                  type: string
                  example: '00'
                  description: Payment status code ('00' indicates successful payment)
                data:
                  type: object
                  properties:
                    orderCode:
                      type: number
                      example: 123456789
                      description: Order code that links to invoice
                    amount:
                      type: number
                      example: 3240000
                      description: Payment amount
                    description:
                      type: string
                      example: 'Payment for Invoice INV-20260130-001'
                    transactionDateTime:
                      type: string
                      example: '2026-01-30T14:30:00Z'
                    reference:
                      type: string
                      example: 'FT21348901234'
                signature:
                  type: string
                  description: PayOS signature for webhook verification
                  example: 'a1b2c3d4e5f6...'
      responses:
        '200':
          description: Webhook received and processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        '400':
          description: Invalid webhook data or signature verification failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Invalid webhook signature'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Internal server error'

  # ============================================================
  # FEEDBACK MANAGEMENT
  # ============================================================
  /api/feedback:
    get:
      tags:
        - Feedback
      summary: Get all feedbacks
      description: |
        Retrieve all order feedbacks with optional filtering.
        
        **Filters:** rating, storeId, date range
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: rating
          schema:
            type: integer
            minimum: 1
            maximum: 5
          description: Filter by rating (1-5)
        - in: query
          name: storeId
          schema:
            type: string
          description: Filter by store ID
        - in: query
          name: startDate
          schema:
            type: string
            format: date
          description: Filter from this date
        - in: query
          name: endDate
          schema:
            type: string
            format: date
          description: Filter until this date
      responses:
        '200':
          description: Successfully retrieved feedbacks
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Feedback'

  /api/feedback/{orderId}:
    get:
      tags:
        - Feedback
      summary: Get feedback for a specific order
      description: Retrieve feedback submitted for a specific order
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
          description: Order ID
      responses:
        '200':
          description: Successfully retrieved feedback
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Feedback'
        '404':
          description: Feedback not found for this order
    
    post:
      tags:
        - Feedback
      summary: Create feedback for an order
      description: |
        Submit feedback for a received order. Only allowed for orders in 'Received' status.
        Store staff can rate their experience and provide comments.
        
        **Requirements:**
        - Order must be in 'Received' status
        - Only one feedback per order
        - Rating must be between 1-5
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
          description: Order ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - rating
              properties:
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                  description: Rating from 1 (poor) to 5 (excellent)
                  example: 5
                content:
                  type: string
                  description: Feedback comment/review
                  example: 'Excellent quality and on-time delivery!'
                images:
                  type: array
                  items:
                    type: string
                  description: Array of image URLs
                  example: ['https://example.com/image1.jpg', 'https://example.com/image2.jpg']
      responses:
        '201':
          description: Feedback created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: 'Feedback submitted successfully'
                  data:
                    $ref: '#/components/schemas/Feedback'
        '400':
          description: Invalid input (e.g., order not in Received status, feedback already exists)
        '404':
          description: Order not found

